<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosliding.dk – Initiativer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --accent:      #da253c;
  --accent-l:    #f04056;
  --accent-pale: #fdeaed;
  --white:       #ffffff;
  --bg:          #f5f6f8;
  --card-bg:     #ffffff;
  --text:        #111827;
  --muted:       #6b7280;
  --border:      #e5e7eb;
  --hdr:         #1f2937;
  --hdr-dark:    #111827;
  --sidebar-w:   240px;
  --topbar-h:    56px;
  --low-bg:  #f0fdf4; --low-txt:  #15803d;
  --mid-bg:  #fffbeb; --mid-txt:  #b45309;
  --high-bg: #fef2f2; --high-txt: #b91c1c;
  --done-bg: #f3f4f6; --done-txt: #9ca3af;
  --on-bg:   #eff6ff; --on-txt:   #1d4ed8;
  --shadow:      0 2px 12px rgba(0,0,0,0.07);
  --shadow-h:    0 8px 28px rgba(0,0,0,0.13);
  --radius:      12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* ─── APP SHELL ──────────────────────────────────────────────────────── */
.app-shell { display: flex; width: 100%; min-height: 100vh; }

/* ─── SIDEBAR ────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--hdr-dark);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo {
  padding: 1.25rem 1.25rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.sidebar-logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.sidebar-logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 800;
  color: white; letter-spacing: 0.5px; line-height: 1.1;
}
.sidebar-logo-sub {
  font-size: 10px; color: rgba(255,255,255,0.35);
  font-weight: 400; letter-spacing: 0.5px;
}

.sidebar-nav { flex: 1; padding: 0.75rem 0; }
.sidebar-section-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.25);
  padding: 0.75rem 1.25rem 0.3rem;
}
.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  padding: 0.5rem 1.25rem;
  color: rgba(255,255,255,0.5);
  cursor: pointer; font-size: 13px; font-weight: 500;
  border-radius: 0;
  transition: all 0.15s;
  user-select: none;
  border: none; background: none; width: 100%; text-align: left;
  position: relative;
}
.sidebar-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); }
.sidebar-item.active {
  color: white; background: rgba(218,37,60,0.2);
  font-weight: 600;
}
.sidebar-item.active::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
}
.sidebar-item-icon { font-size: 15px; flex-shrink: 0; }
.sidebar-item-badge {
  margin-left: auto; background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.45); font-size: 10px; font-weight: 700;
  padding: 1px 7px; border-radius: 20px;
}
.sidebar-item.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.sidebar-ws-list { padding: 0 0 0.25rem; }
.sidebar-ws-item {
  display: flex; align-items: center; gap: 8px;
  padding: 0.35rem 1.25rem 0.35rem 2.25rem;
  color: rgba(255,255,255,0.45);
  cursor: pointer; font-size: 12px; font-weight: 500;
  transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left;
}
.sidebar-ws-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
.sidebar-ws-item.active { color: white; font-weight: 600; }
.sidebar-ws-item-icon { font-size: 13px; flex-shrink: 0; }
.sidebar-add-ws {
  display: flex; align-items: center; gap: 8px;
  padding: 0.35rem 1.25rem 0.35rem 2.25rem;
  color: rgba(255,255,255,0.3);
  cursor: pointer; font-size: 12px;
  border: none; background: none; width: 100%; text-align: left;
  transition: all 0.15s;
}
.sidebar-add-ws:hover { color: var(--accent); }
.sidebar-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.sidebar-footer-item {
  display: flex; align-items: center; gap: 9px;
  color: rgba(255,255,255,0.28); font-size: 12px;
  padding: 0.4rem 0;
  cursor: default;
}

/* ─── MAIN AREA ───────────────────────────────────────────────────────── */
.main-area {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ─── TOP BAR ────────────────────────────────────────────────────────── */
.topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
  position: sticky;
  top: 0; z-index: 50;
  flex-shrink: 0;
}
.topbar-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--muted); flex: 1;
}
.topbar-breadcrumb strong { color: var(--text); font-weight: 600; }
.topbar-breadcrumb .sep { color: var(--border); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.btn-primary {
  background: var(--accent); border: none; color: white;
  padding: 7px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-family: 'Barlow', sans-serif; font-weight: 600;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.btn-primary:hover { background: var(--accent-l); }
.btn-secondary {
  background: white; border: 1px solid var(--border); color: var(--text);
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-family: 'Barlow', sans-serif; font-weight: 500;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ─── PAGE CONTENT ───────────────────────────────────────────────────── */
.page-content { flex: 1; padding: 1.75rem 2rem 3rem; }

/* ─── DASHBOARD PAGE ─────────────────────────────────────────────────── */
.dashboard-page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 800; margin-bottom: 0.25rem;
}
.dashboard-page-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.75rem; }
.dashboard-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 2rem;
}
.stat-card {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
  box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; color: var(--accent); line-height: 1; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

.dashboard-section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}
.dashboard-ws-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;
  margin-bottom: 2rem;
}
.dashboard-ws-card {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.dashboard-ws-card:hover { box-shadow: var(--shadow-h); border-color: #d1d5db; transform: translateY(-1px); }
.dashboard-ws-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dashboard-ws-icon { font-size: 20px; }
.dashboard-ws-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
.dashboard-ws-count { font-size: 12px; color: var(--muted); }
.dashboard-ws-bar { height: 3px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.dashboard-ws-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

.deadline-list { display: flex; flex-direction: column; gap: 8px; }
.deadline-item {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 0.85rem 1.25rem; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.deadline-item.near { border-color: #fca5a5; background: #fff5f5; }
.deadline-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  background: var(--accent-pale); color: var(--accent); flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.deadline-title { font-weight: 600; font-size: 13px; flex: 1; }
.deadline-date { font-size: 12px; color: var(--muted); }

/* ─── WORKSPACE OVERVIEW PAGE ─────────────────────────────────────────── */
.ws-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px;
}
.ws-card {
  background: white; border-radius: var(--radius); border: 1px solid var(--border);
  box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; overflow: hidden;
  animation: fadeIn 0.3s ease both;
}
.ws-card:hover { box-shadow: var(--shadow-h); border-color: #d1d5db; transform: translateY(-2px); }
.ws-card-top { display: flex; align-items: center; gap: 12px; padding: 1.25rem 1.25rem 0.9rem; flex: 1; }
.ws-ikon { width: 44px; height: 44px; border-radius: 10px; background: var(--accent-pale); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.ws-name { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; line-height: 1.2; }
.ws-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.ws-card-foot { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 1.25rem; border-top: 1px solid var(--border); background: #fafbfc; }
.ws-count { font-size: 12px; color: var(--muted); }
.ws-count strong { color: var(--text); font-weight: 700; }
.ws-card-btns { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; font-size: 13px; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }
.ws-add-card {
  background: transparent; border: 2px dashed var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  padding: 2.5rem 1rem; cursor: pointer; transition: all 0.2s; color: var(--muted); min-height: 140px;
}
.ws-add-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }
.ws-add-icon { font-size: 28px; }
.ws-add-txt { font-size: 13px; font-weight: 600; }

/* ─── WORKSPACE DETAIL PAGE ───────────────────────────────────────────── */
.ws-detail-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.ws-detail-left { display: flex; align-items: center; gap: 14px; }
.ws-detail-icon {
  width: 52px; height: 52px; border-radius: 12px;
  background: var(--accent-pale); display: flex; align-items: center;
  justify-content: center; font-size: 26px; flex-shrink: 0;
}
.ws-detail-name { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.1; }
.ws-detail-desc { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ─── VIEW SWITCHER ───────────────────────────────────────────────────── */
.view-switcher-bar {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 0.65rem 1rem; margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 5px 14px; border-radius: 8px; border: none;
  background: transparent; color: var(--muted);
  cursor: pointer; font-size: 13px; font-family: 'Barlow', sans-serif;
  font-weight: 500; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.view-tab:hover { background: var(--bg); color: var(--text); }
.view-tab.active { background: var(--accent-pale); color: var(--accent); font-weight: 700; }
.view-switcher-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.filter-chips { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; flex: 1; }
.fchip {
  padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; font-size: 11px; font-family: 'Barlow', sans-serif;
  font-weight: 500; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.fchip:hover { border-color: var(--accent); color: var(--accent); }
.fchip.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
.fchip .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.sort-sel {
  padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: white; color: var(--muted); font-size: 12px; font-family: 'Barlow', sans-serif;
  cursor: pointer; outline: none; margin-left: auto;
}

/* ─── FILTER BAR (collapsible) ───────────────────────────────────────── */
.filter-bar {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 0.75rem 1rem; margin-bottom: 1.25rem;
  display: flex; flex-direction: column; gap: 6px;
}
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-row-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); min-width: 80px; flex-shrink: 0;
}

/* ─── EMPTY STATE ────────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 4rem 2rem;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.empty-icon  { font-size: 52px; }
.empty-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; }
.empty-desc  { font-size: 14px; color: var(--muted); max-width: 360px; line-height: 1.6; }
.empty-cta   {
  background: var(--accent); color: white; border: none; padding: 10px 22px;
  border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 13px;
  font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
}
.empty-cta:hover { background: var(--accent-l); }

/* ─── LIST VIEW ──────────────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.data-table thead { background: var(--hdr); }
.data-table th { color: white; padding: 0.9rem 1.1rem; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.data-table td { padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.data-table tr:hover { background: #fafbfc; }
.data-table tr.done { opacity: 0.6; background: #f9f9f9; }
.table-action-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; font-size: 12px; color: var(--muted);
  display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.table-action-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── KANBAN VIEW ────────────────────────────────────────────────────── */
.kanban-board {
  display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  gap: 14px;
  align-items: start;
}
.kanban-col {
  background: #f0f2f5; border-radius: 12px;
  padding: 0; overflow: hidden;
}
.kanban-col-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem; border-bottom: 2px solid transparent;
}
.kanban-col-head.col-idea    { border-color: #a78bfa; background: #f5f3ff; }
.kanban-col-head.col-planned { border-color: #60a5fa; background: #eff6ff; }
.kanban-col-head.col-ongoing { border-color: #34d399; background: #f0fdf4; }
.kanban-col-head.col-done    { border-color: #9ca3af; background: #f9fafb; }
.kanban-col-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
}
.kanban-col-count {
  font-size: 11px; font-weight: 700; padding: 1px 8px;
  border-radius: 20px; background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.45);
}
.kanban-cards { padding: 0.75rem; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
.kanban-card {
  background: white; border-radius: 10px; border: 1px solid var(--border);
  padding: 0.85rem 1rem; box-shadow: var(--shadow);
  transition: box-shadow 0.15s, transform 0.15s;
  animation: fadeIn 0.3s ease both;
}
.kanban-card:hover { box-shadow: var(--shadow-h); transform: translateY(-1px); }
.kanban-card-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  line-height: 1.25; margin-bottom: 7px;
}
.kanban-card-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.kanban-card-deadline {
  font-size: 11px; color: var(--muted); margin-top: 7px;
  display: flex; align-items: center; gap: 4px;
}
.kanban-card-deadline.near { color: var(--accent); font-weight: 600; }
.kanban-empty {
  padding: 1.25rem 1rem; text-align: center;
  font-size: 12px; color: var(--muted); opacity: 0.6;
}

/* ─── TIMELINE VIEW ──────────────────────────────────────────────────── */
.timeline-view { position: relative; padding: 1rem 0; }
.tl-line {
  position: absolute; left: 140px; top: 0; bottom: 0;
  width: 2px; background: var(--border);
}
.tl-items { display: flex; flex-direction: column; gap: 1.5rem; }
.tl-item { position: relative; display: flex; gap: 0; align-items: flex-start; }
.tl-period-label {
  width: 130px; flex-shrink: 0; text-align: right;
  padding-right: 16px; padding-top: 3px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--accent);
}
.tl-marker-wrap {
  width: 22px; flex-shrink: 0; display: flex; justify-content: center; padding-top: 4px;
}
.tl-marker {
  width: 14px; height: 14px; background: var(--accent);
  border: 3px solid white; border-radius: 50%;
  box-shadow: 0 0 0 2px var(--accent);
}
.tl-box {
  flex: 1; padding: 0.9rem 1.1rem; background: white;
  border-radius: 10px; border: 1px solid var(--border);
  margin-left: 12px; box-shadow: var(--shadow);
}
.tl-box h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.tl-box p { font-size: 12px; color: var(--muted); line-height: 1.5; }
.tl-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }

/* ─── CARD VIEW ──────────────────────────────────────────────────────── */
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media(max-width: 780px) { .cards-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
  box-shadow: var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
  overflow: hidden; position: relative; animation: fadeIn 0.3s ease both;
}
.card:hover { box-shadow: var(--shadow-h); border-color: #d1d5db; }
.card.done  { opacity: 0.65; }
.card.done .card-title { text-decoration: line-through; color: var(--muted); }
.card-header {
  padding: 1rem 1.25rem 0.75rem; display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer; user-select: none;
}
.card-num {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  background: var(--text); color: white; width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.card.done .card-num { background: var(--done-bg); color: var(--done-txt); }
.card-header-content { flex: 1; min-width: 0; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; line-height: 1.2; letter-spacing: 0.3px; }
.card-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.chevron { font-size: 13px; color: var(--muted); transition: transform 0.25s; line-height: 1; margin-top: 2px; }
.card.expanded .chevron { transform: rotate(180deg); }
.card-roi { padding: 0 1.25rem 0.85rem; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.roi-lbl  { font-size: 11px; color: var(--muted); font-weight: 500; min-width: 26px; }
.roi-track { flex: 1; height: 4px; background: #e9ecef; border-radius: 3px; overflow: hidden; }
.roi-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-l)); border-radius: 3px; transition: width 0.4s ease; }
.roi-score { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); min-width: 36px; text-align: right; }
.card-meta { padding: 0 1.25rem 0.85rem; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.meta-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.b-low    { background: var(--low-bg);  color: var(--low-txt); }
.b-mid    { background: var(--mid-bg);  color: var(--mid-txt); }
.b-high   { background: var(--high-bg); color: var(--high-txt); }
.b-done   { background: var(--done-bg); color: var(--done-txt); }
.b-ongoing{ background: var(--on-bg);   color: var(--on-txt); }
.meta-txt  { font-size: 11px; color: var(--muted); }
.meta-txt.near { color: var(--accent); font-weight: 700; }
.card-actions { display: flex; gap: 5px; }
.action-btn {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.15s; color: var(--muted);
}
.action-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
.action-btn.done-btn:hover { background: var(--low-bg); border-color: var(--low-txt); color: var(--low-txt); }
.action-btn.del-btn:hover  { background: var(--accent-pale); border-color: var(--accent); color: var(--accent); }
.card-body {
  display: none; padding: 0 1.25rem 1.25rem;
  border-top: 1px solid var(--border); background: #fafbfc;
}
.card.expanded .card-body { display: block; animation: slideDown 0.2s ease; }
.short-desc { font-size: 13px; color: var(--muted); padding: 1rem 0 0.75rem; font-style: italic; border-bottom: 1px dashed var(--border); margin-bottom: 0.75rem; }
.detail-text { font-size: 13.5px; line-height: 1.75; color: var(--text); margin-bottom: 1rem; }
.impact-block { background: var(--accent-pale); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 0.75rem 1rem; font-size: 12.5px; color: var(--text); line-height: 1.6; }
.impact-lbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.edit-section { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--accent); }
.card.edit-mode .edit-section { display: block; }
.card.edit-mode .view-section { display: none; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.edit-field { display: flex; flex-direction: column; gap: 4px; }
.edit-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.edit-inp, .edit-ta {
  font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text);
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; outline: none; transition: border-color 0.15s; width: 100%;
}
.edit-inp:focus, .edit-ta:focus { border-color: var(--accent); }
.edit-ta { resize: vertical; min-height: 72px; line-height: 1.6; }
.edit-full { grid-column: 1 / -1; }
.edit-save-btn {
  margin-top: 8px; background: var(--accent); color: white; border: none;
  padding: 8px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.edit-save-btn:hover { background: var(--accent-l); }
.done-section { margin-top: 2.5rem; }
.section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}
.done-section .section-title { color: #bbb; }
.done-section .cards-grid { opacity: 0.7; }

/* ─── MODALS ─────────────────────────────────────────────────────────── */
.modal {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.45); align-items: center; justify-content: center;
}
.modal.open { display: flex; }
.modal-box {
  background: white; border-radius: var(--radius);
  width: 92%; max-width: 600px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2); animation: modalIn 0.2s ease;
}
@keyframes modalIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
.modal-head { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1.75rem 1rem; border-bottom: 1px solid var(--border); }
.modal-head h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; }
.modal-body { padding: 1.25rem 1.75rem; }
.modal-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 1rem 1.75rem 1.5rem; border-top: 1px solid var(--border); }
.close-x { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--muted); line-height: 1; }
.close-x:hover { color: var(--text); }

/* ─── FORM ELEMENTS ──────────────────────────────────────────────────── */
.form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-field.last { margin-bottom: 0; }
.form-lbl { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.form-inp, .form-ta {
  font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text);
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; outline: none; transition: border-color 0.2s; width: 100%;
}
.form-inp:focus, .form-ta:focus { border-color: var(--accent); }
.form-ta { resize: vertical; min-height: 72px; line-height: 1.55; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-save   { background: var(--accent); color: white; border: none; padding: 9px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-save:hover { background: var(--accent-l); }
.btn-cancel { background: var(--border); color: var(--text); border: none; padding: 9px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-cancel:hover { background: #d1d5db; }
.btn-danger { background: var(--accent-pale); color: var(--accent); border: 1px solid #fca5a5; padding: 9px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-danger:hover { background: var(--accent); color: white; }
.roi-wrap { display: flex; align-items: center; gap: 10px; }
.roi-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
.roi-val { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--accent); min-width: 34px; text-align: right; }
.hor-wrap { display: flex; flex-direction: column; gap: 4px; }
.hor-slider { width: 100%; accent-color: var(--accent); cursor: pointer; }
.hor-lbls { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
.hor-cur  { font-size: 12px; font-weight: 700; color: var(--accent); text-align: center; }
.circle-sel { display: flex; gap: 14px; }
.circle-opt { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.circle-opt input[type="radio"] { display: none; }
.cdot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; transition: all 0.15s; opacity: 0.35; }
.circle-opt input[type="radio"]:checked + .cdot { opacity: 1; border-color: #111; transform: scale(1.18); box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.cdot.g { background: #22c55e; }
.cdot.y { background: #f59e0b; }
.cdot.r { background: #ef4444; }
.clbl { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.ikon-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.ikon-opt {
  width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid var(--border);
  background: white; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.ikon-opt:hover { border-color: var(--accent); }
.ikon-opt.sel   { border-color: var(--accent); background: var(--accent-pale); }
#wsDeleteModal .modal-box { max-width: 400px; }
#initDeleteModal .modal-box { max-width: 400px; }

/* ─── ANIMATIONS ─────────────────────────────────────────────────────── */
@keyframes fadeIn   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

/* ─── RESPONSIVE ─────────────────────────────────────────────────────── */
@media(max-width: 900px) {
  :root { --sidebar-w: 200px; }
  .kanban-board { grid-template-columns: repeat(2, 1fr); }
  .dashboard-stats { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width: 680px) {
  .sidebar { display: none; }
  .main-area { margin-left: 0; }
  .kanban-board { grid-template-columns: 1fr; }
  .page-content { padding: 1rem; }
  .form-grid2, .edit-grid { grid-template-columns: 1fr; }
  .modal-box { max-width: 95%; margin: 1rem; }
}
</style>
</head>
<body>

<div class="app-shell">

<!-- ═══════════════════ SIDEBAR ═════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🏆</div>

      <div class="sidebar-logo-text">Prosliding</div>

  <!-- TOP BAR -->

</div><!-- /app-shell -->

<!-- ═══════════════════ WORKSPACE MODAL ═════════════════════════════════ -->
<div class="modal" id="wsModal">

      <div class="form-field last">

<!-- ═══════════════════ INITIATIVE MODAL ════════════════════════════════ -->
<div class="modal" id="initModal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Nyt initiativ</h2>
      <button class="close-x" onclick="closeModal('initModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-lbl">Titel *</label>
        <input class="form-inp" id="init-titel" placeholder="Hvad skal der gøres?">
      </div>
      <div class="form-field">
        <label class="form-lbl">Kort beskrivelse</label>
        <input class="form-inp" id="init-kort" placeholder="Én linje opsummering…">
      </div>
      <div class="form-field">
        <label class="form-lbl">Detaljer</label>
        <textarea class="form-ta" id="init-detaljer" placeholder="Uddybende beskrivelse…"></textarea>
      </div>
      <div class="form-field">
        <label class="form-lbl">Forventet effekt</label>
        <textarea class="form-ta" id="init-effekt" placeholder="Hvad opnår vi?" rows="2"></textarea>
      </div>
      <div class="form-grid2">
        <div class="form-field">
          <label class="form-lbl">Estimeret pris (kr)</label>
          <input class="form-inp" type="number" id="init-cost" placeholder="0">
        </div>
        <div class="form-field">

            oninput="setHorLbl('init-hor-lbl', this.value)">
          <div class="hor-lbls"><span>Dage</span><span>Uger</span><span>Måneder</span><span>År</span></div>
          <div class="hor-cur" id="init-hor-lbl">Uger</div>

      </div>
      <div class="form-grid2">

            <label class="circle-opt"><input type="radio" name="init-effect" value="mid" checked><div class="cdot y"></div><span class="clbl">Middel</span></label>

<!-- ═══════════════════ JAVASCRIPT ══════════════════════════════════════ -->
<script>
/* ── CONSTANTS ──────────────────────────────────────────────────────── */
const HOR_LBLS = ['Dage','Uger','Måneder','År'];
const IKONER   = ['📁','🌐','📣','💼','🤝','📸','🏆','🎯','📊','✉️','🛠️','🎽','📅','💡','🏅','🧩','🎬','🗓️'];

const KANBAN_COLS = [
  { key:'idea',    label:'Idé',       headClass:'col-idea',    statuses:['idea'] },
  { key:'planned', label:'Planlagt',  headClass:'col-planned', statuses:['planned'] },
  { key:'ongoing', label:'Igang',     headClass:'col-ongoing', statuses:['ongoing'] },
  { key:'done',    label:'Afsluttet', headClass:'col-done',    statuses:['done'] },
];

/* ── STATE ──────────────────────────────────────────────────────────── */
let workspaces    = [];
let initiatives   = [];
let nextWsId      = 1;
let nextInitId    = 1;

/* Navigation state */
let currentPage   = 'dashboard'; // 'dashboard' | 'workspaces' | 'ws-detail'
let activeWsId    = null;

/* Filter + view state (for ws-detail) */
let currentView   = 'list';  // 'list' | 'kanban' | 'timeline' | 'card'
let fStatus       = 'all';
let fDiff         = 'all';
let fEffect       = 'all';
let fHorizon      = 'all';

/* Modal state */
let editingWsId    = null;
let deletingWsId   = null;
let deletingInitId = null;
let selectedIkon   = '📁';

/* ── ESCAPE ────────────────────────────���────────────────────────────── */
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── MODAL HELPERS ──────────────────────────────────────────────────── */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

/* ── IKON PICKER ────────────────────────────────────────────────────── */
function buildIkonPicker(selected) {
  selectedIkon = selected || '📁';
  const el = document.getElementById('ikon-picker');
  el.innerHTML = '';
  IKONER.forEach(ikon => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ikon-opt' + (ikon === selectedIkon ? ' sel' : '');
    btn.textContent = ikon;
    btn.onclick = () => {
      el.querySelectorAll('.ikon-opt').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      selectedIkon = ikon;
    };
    el.appendChild(btn);
  });
}

/* ── HORIZON LABEL ──────────────────────────────────────────────────── */
function setHorLbl(elId, val) {
  const el = document.getElementById(elId);
  if (el) el.textContent = HOR_LBLS[parseInt(val)] || 'Uger';
}

/* ── BADGE HELPERS ──────────────────────────────────────────────────── */
function diffBadge(d) {
  const m = { low:['#22c55e','b-low','Lav'], mid:['#f59e0b','b-mid','Middel'], high:['#ef4444','b-high','Høj'] };
  const [c,cls,l] = m[d]||m.low;
  return `<span class="badge ${cls}"><span class="dot" style="background:${c}"></span>${l}</span>`;
}
function effectBadge(e) {
  const m = { low:['#22c55e','b-low','Lav'], mid:['#f59e0b','b-mid','Middel'], high:['#ef4444','b-high','Høj'] };
  const [c,cls,l] = m[e]||m.mid;
  return `<span class="badge ${cls}"><span class="dot" style="background:${c}"></span>${l}</span>`;
}
function statusBadge(s) {
  if (s==='done')    return `<span class="badge b-done">Afsluttet</span>`;
  if (s==='idea')    return `<span class="badge" style="background:#f5f3ff;color:#7c3aed">Idé</span>`;
  if (s==='planned') return `<span class="badge" style="background:#eff6ff;color:#1d4ed8">Planlagt</span>`;
  return `<span class="badge b-ongoing">Igang</span>`;
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('da-DK',{day:'numeric',month:'short',year:'numeric'});
}
function isNear(d) {
  if (!d) return false;
  const diff = new Date(d) - new Date();
  return diff > 0 && diff < 14*86400000;
}

/* ── SORT + FILTER ──────────────────────────────────────────────────── */
function getSorted(arr) {
  const sel = document.getElementById('sort-select');
  const sort = sel ? sel.value : 'default';
  const copy = [...arr];
  if      (sort==='roi')      copy.sort((a,b) => b.roi - a.roi);
  else if (sort==='cost')     copy.sort((a,b) => (a.cost||0)-(b.cost||0));
  else if (sort==='deadline') copy.sort((a,b) => { if(!a.deadline)return 1; if(!b.deadline)return -1; return new Date(a.deadline)-new Date(b.deadline); });
  else if (sort==='horizon')  copy.sort((a,b) => (a.horizonIndex||0)-(b.horizonIndex||0));
  else copy.sort((a,b) => a.id-b.id);
  return copy;
}
function getFiltered(arr) {
  return arr.filter(i => {
    if (fStatus  !== 'all' && i.status       !== fStatus)          return false;
    if (fDiff    !== 'all' && i.difficulty   !== fDiff)            return false;
    if (fEffect  !== 'all' && i.effect       !== fEffect)          return false;
    if (fHorizon !== 'all' && String(i.horizonIndex) !== fHorizon) return false;
    return true;
  });
}

/* ── NAVIGATION ─────────────────────────────────────────────────────── */
function navigate(page, wsId) {
  currentPage = page;
  activeWsId  = wsId || null;
  if (page !== 'ws-detail') {
    currentView = 'list';
    fStatus = fDiff = fEffect = fHorizon = 'all';
  }
  renderSidebar();
  renderTopbar();
  renderPage();
}

/* ── SIDEBAR RENDER ─────────────────────────────────────────────────── */
function renderSidebar() {
  // nav item active states
  document.getElementById('nav-dashboard').classList.toggle('active', currentPage==='dashboard');
  document.getElementById('nav-workspaces').classList.toggle('active', currentPage==='workspaces');

  // ws list
  const list = document.getElementById('sidebar-ws-list');
  list.innerHTML = '';
  workspaces.forEach(ws => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-ws-item' + (currentPage==='ws-detail' && activeWsId===ws.id ? ' active' : '');
    btn.innerHTML = `<span class="sidebar-ws-item-icon">${ws.ikon}</span>${esc(ws.navn)}`;
    btn.onclick = () => navigate('ws-detail', ws.id);
    list.appendChild(btn);
  });
}

/* ── TOPBAR RENDER ──────────────────────────────────────────────────── */
function renderTopbar() {
  const bc = document.getElementById('topbar-breadcrumb');
  const ac = document.getElementById('topbar-actions');
  ac.innerHTML = '';

  if (currentPage === 'dashboard') {
    bc.innerHTML = '<strong>Dashboard</strong>';
  } else if (currentPage === 'workspaces') {
    bc.innerHTML = '<strong>Arbejdsområder</strong>';
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.innerHTML = '＋ Nyt arbejdsområde';
    btn.onclick = openWsModal;
    ac.appendChild(btn);
  } else if (currentPage === 'ws-detail') {
    const ws = workspaces.find(w => w.id===activeWsId);
    bc.innerHTML = `
      <span onclick="navigate('workspaces')" style="cursor:pointer">Arbejdsområder</span>
      <span class="sep">›</span>
      <strong>${ws ? esc(ws.navn) : '—'}</strong>`;
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.innerHTML = '＋ Nyt initiativ';
    btn.onclick = openInitModal;
    ac.appendChild(btn);
  }
}

/* ── PAGE RENDER ────────────────────────────────────────────────────── */
function renderPage() {
  const el = document.getElementById('page-content');
  if      (currentPage === 'dashboard')  renderDashboard(el);
  else if (currentPage === 'workspaces') renderWorkspaces(el);
  else if (currentPage === 'ws-detail')  renderWsDetail(el);
}

        <div class="ws-detail-icon">${ws.ikon}</div>

function setView(v) {
  currentView = v;
  renderPage();
}
function setFilter(type, val) {
  if (type==='status')  fStatus  = val;
  if (type==='diff')    fDiff    = val;
  if (type==='effect')  fEffect  = val;
  if (type==='horizon') fHorizon = val;
  renderPage();
}

/* ════════════════════════════════════════════════════════════════════════
   VIEW: LIST (TABLE)
   ════════════════════════════════════════════════════════════════════════ */

    <div style="overflow-x:auto">

      <thead>
        <tr>
          <th>#</th><th>Titel</th><th>Status</th><th>Vanskelighed</th>
          <th>Effekt</th><th>Horisont</th><th>Deadline</th><th>ROI</th><th>Pris</th><th></th>
        </tr>

    html += `<tr class="${i.status==='done'?'done':''}">
      <td><span style="font-family:'Barlow Condensed';font-weight:700;font-size:12px">#${i.id}</span></td>
      <td><strong style="font-size:13px">${esc(i.titel)}</strong>${i.kort?'<br><span style="color:var(--muted);font-size:11px">'+esc(i.kort)+'</span>':''}</td>
      <td>${statusBadge(i.status)}</td>
      <td>${diffBadge(i.difficulty)}</td>
      <td>${effectBadge(i.effect)}</td>

/* ════════════════════════════════════════════════════════════════════════
   VIEW: KANBAN
   ════════════════════════════════════════════════════════════════════════ */
function renderKanbanView(el, wsInits) {
  const statusMap = { idea:'idea', planned:'planned', ongoing:'ongoing', done:'done' };
  let html = '<div class="kanban-board">';
  KANBAN_COLS.forEach(col => {
    const cards = wsInits.filter(i => (i.status||'ongoing') === col.key);
    html += `
      <div class="kanban-col">
        <div class="kanban-col-head ${col.headClass}">
          <span class="kanban-col-title">${col.label}</span>
          <span class="kanban-col-count">${cards.length}</span>
        </div>
        <div class="kanban-cards">`;
    if (cards.length === 0) {
      html += `<div class="kanban-empty">Tom kolonne</div>`;
    } else {
      cards.forEach(i => {
        const near = isNear(i.deadline);
        html += `
          <div class="kanban-card">
            <div class="kanban-card-title">${esc(i.titel)}</div>
            <div class="kanban-card-meta">
              ${diffBadge(i.difficulty)}
              ${effectBadge(i.effect)}
            </div>
            ${i.deadline ? `<div class="kanban-card-deadline${near?' near':''}">📅 ${fmtDate(i.deadline)}</div>` : ''}
          </div>`;
      });
    }
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

   VIEW: TIMELINE
   ════════════════════════════════════════════════════════════════════════ */
function renderTimelineView(el, items) {
  const sorted = [...items].sort((a,b) => (a.horizonIndex||0)-(b.horizonIndex||0));
  if (sorted.length === 0) { el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted)">Ingen initiativer matcher filteret.</div>'; return; }

  let html = '<div class="timeline-view"><div class="tl-line"></div><div class="tl-items">';
  sorted.forEach(i => {
    html += `
      <div class="tl-item">
        <div class="tl-period-label">${HOR_LBLS[i.horizonIndex]||'—'}</div>
        <div class="tl-marker-wrap"><div class="tl-marker"></div></div>
        <div class="tl-box">
          <h3>${esc(i.titel)}</h3>
          ${i.kort ? `<p>${esc(i.kort)}</p>` : ''}
          <div class="tl-badges">
            ${statusBadge(i.status)}
            ${diffBadge(i.difficulty)}
            ${effectBadge(i.effect)}
            ${i.deadline ? `<span class="badge" style="background:#f3f4f6;color:#374151">📅 ${fmtDate(i.deadline)}</span>` : ''}
          </div>
        </div>
      </div>`;
  });
  html += '</div></div>';
  el.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════════════
   VIEW: CARD (expanded accordion)
   ════════════════════════════════════════════════════════════════════════ */
function renderCardView(el, items) {
  const active = items.filter(i=>i.status!=='done');
  const done   = items.filter(i=>i.status==='done');
  el.innerHTML = '';
  if (active.length === 0 && done.length === 0) {
    el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted)">Ingen initiativer matcher filteret.</div>';
    return;
  }
  if (active.length > 0) {
    const g = document.createElement('div'); g.className='cards-grid';
    active.forEach(i => g.appendChild(buildCard(i)));
    el.appendChild(g);
  }
  if (done.length > 0) {
    const s = document.createElement('div'); s.className='done-section';
    s.innerHTML = '<div class="section-title">Afsluttede</div>';
    const g = document.createElement('div'); g.className='cards-grid';
    done.forEach(i => g.appendChild(buildCard(i)));
    s.appendChild(g);
    el.appendChild(s);
  }
}

function buildCard(i) {
  const card = document.createElement('div');
  card.className = `card${i.status==='done'?' done':''}`;
  card.id = `card-${i.id}`;
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${i.id})">
      <div class="card-num">#${i.id}</div>
      <div class="card-header-content">
        <div class="card-title">${esc(i.titel)}</div>
      </div>
      <div class="card-header-right">
        ${statusBadge(i.status)}
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="card-roi" onclick="toggleCard(${i.id})">
      <span class="roi-lbl">ROI</span>
      <div class="roi-track"><div class="roi-fill" style="width:${i.roi*10}%"></div></div>
      <span class="roi-score">${i.roi}</span>
    </div>
    <div class="card-meta">
      <div class="meta-badges">
        ${diffBadge(i.difficulty)}
        ${effectBadge(i.effect)}
        <span class="badge" style="background:#f3f4f6;color:#374151">${HOR_LBLS[i.horizonIndex]||'—'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${i.deadline ? `<span class="meta-txt${isNear(i.deadline)?' near':''}">📅 ${fmtDate(i.deadline)}</span>` : ''}
        <div class="card-actions">
          <button class="action-btn done-btn" title="${i.status==='done'?'Genaktiver':'Afslut'}" onclick="toggleDone(${i.id})">${i.status==='done'?'↩':'✓'}</button>
          <button class="action-btn" title="Rediger" onclick="startEditInit(${i.id})">✎</button>
          <button class="action-btn del-btn" title="Slet" onclick="openInitDeleteConfirm(${i.id})">🗑</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="view-section">
        ${i.kort ? `<div class="short-desc">${esc(i.kort)}</div>` : ''}
        ${i.detaljer ? `<div class="detail-text">${esc(i.detaljer)}</div>` : ''}
        ${i.effekt ? `<div class="impact-block"><div class="impact-lbl">Forventet effekt</div>${esc(i.effekt)}</div>` : ''}
        ${i.cost ? `<div style="margin-top:0.75rem;font-size:12px;color:var(--muted)">💰 Estimeret pris: <strong>${i.cost.toLocaleString('da-DK')} kr</strong></div>` : ''}
      </div>
      <div class="edit-section">
        <div class="edit-grid">
          <div class="edit-field edit-full">
            <div class="edit-lbl">Titel</div>
            <input class="edit-inp" id="ei-titel-${i.id}" value="${esc(i.titel)}">
          </div>
          <div class="edit-field edit-full">
            <div class="edit-lbl">Kort beskrivelse</div>
            <input class="edit-inp" id="ei-kort-${i.id}" value="${esc(i.kort||'')}">
          </div>
          <div class="edit-field edit-full">
            <div class="edit-lbl">Detaljer</div>
            <textarea class="edit-ta" id="ei-det-${i.id}">${esc(i.detaljer||'')}</textarea>
          </div>
          <div class="edit-field edit-full">
            <div class="edit-lbl">Effekt</div>
            <textarea class="edit-ta" id="ei-eff-${i.id}" rows="2">${esc(i.effekt||'')}</textarea>
          </div>
          <div class="edit-field">
            <div class="edit-lbl">Pris (kr)</div>
            <input class="edit-inp" type="number" id="ei-cost-${i.id}" value="${i.cost||0}">
          </div>
          <div class="edit-field">
            <div class="edit-lbl">Deadline</div>
            <input class="edit-inp" type="date" id="ei-dl-${i.id}" value="${i.deadline||''}">
          </div>
          <div class="edit-field">
            <div class="edit-lbl">ROI (0–10)</div>
            <input class="edit-inp" type="number" min="0" max="10" step="0.5" id="ei-roi-${i.id}" value="${i.roi}">
          </div>
          <div class="edit-field">
            <div class="edit-lbl">Horisont</div>
            <select class="edit-inp" id="ei-hor-${i.id}">
              ${HOR_LBLS.map((l,idx)=>`<option value="${idx}"${idx===i.horizonIndex?' selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          <div class="edit-field">
            <div class="edit-lbl">Status</div>
            <select class="edit-inp" id="ei-status-${i.id}">
              <option value="idea"${i.status==='idea'?' selected':''}>Idé</option>
              <option value="planned"${i.status==='planned'?' selected':''}>Planlagt</option>
              <option value="ongoing"${i.status==='ongoing'?' selected':''}>Igang</option>
              <option value="done"${i.status==='done'?' selected':''}>Afsluttet</option>
            </select>
          </div>
        </div>
        <button class="edit-save-btn" onclick="saveInlineEdit(${i.id})">Gem ændringer</button>
        <button onclick="cancelEditInit(${i.id})" style="margin-left:8px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted)">Annuller</button>
      </div>
    </div>`;
  return card;
}

function toggleCard(id) {
  const c = document.getElementById(`card-${id}`);
  if (c) c.classList.toggle('expanded');
}

/* ════════════════════════════════════════════════════════════════════════
   WORKSPACE CRUD
   ════════════════════════════════════════════════════════════════════════ */
function openWsModal() {
  editingWsId = null;
  document.getElementById('ws-modal-title').textContent = 'Nyt arbejdsområde';
  document.getElementById('ws-navn').value = '';
  document.getElementById('ws-desc').value = '';
  buildIkonPicker('📁');
  openModal('wsModal');
  setTimeout(() => document.getElementById('ws-navn').focus(), 100);
}
function openWsEditModal(wsId) {
  editingWsId = wsId;
  const ws = workspaces.find(w=>w.id===wsId);
  if (!ws) return;
  document.getElementById('ws-modal-title').textContent = 'Rediger arbejdsområde';
  document.getElementById('ws-navn').value = ws.navn;
  document.getElementById('ws-desc').value = ws.beskrivelse||'';
  buildIkonPicker(ws.ikon);
  openModal('wsModal');
}
function saveWorkspace() {
  const navn = document.getElementById('ws-navn').value.trim();
  if (!navn) { document.getElementById('ws-navn').focus(); return; }
  const desc = document.getElementById('ws-desc').value.trim();
  if (editingWsId !== null) {
    const ws = workspaces.find(w=>w.id===editingWsId);
    if (ws) { ws.navn = navn; ws.beskrivelse = desc; ws.ikon = selectedIkon; }
  } else {
    workspaces.push({ id: nextWsId++, navn, beskrivelse: desc, ikon: selectedIkon, createdAt: new Date().toISOString() });
  }
  closeModal('wsModal');
  editingWsId = null;
  renderSidebar();
  renderTopbar();
  renderPage();
}
function openWsDeleteConfirm(wsId) {
  deletingWsId = wsId;
  const ws = workspaces.find(w=>w.id===wsId);
  document.getElementById('ws-delete-name').textContent = ws ? ws.navn : '';
  openModal('wsDeleteModal');
}
function confirmDeleteWs() {
  if (deletingWsId === null) return;
  workspaces = workspaces.filter(w=>w.id!==deletingWsId);
  initiatives = initiatives.filter(i=>i.wsId!==deletingWsId);
  if (activeWsId===deletingWsId) navigate('workspaces');
  deletingWsId = null;
  closeModal('wsDeleteModal');
  renderSidebar();
  renderTopbar();
  renderPage();
}

/* ════════════════════════════════════════════════════════════════════════
   INITIATIVE CRUD
   ════════════════════════════════════════════════════════════════════════ */
function openInitModal() {
  if (activeWsId === null) return;
  document.getElementById('init-titel').value = '';
  document.getElementById('init-kort').value  = '';
  document.getElementById('init-detaljer').value = '';
  document.getElementById('init-effekt').value   = '';
  document.getElementById('init-cost').value     = '';
  document.getElementById('init-deadline').value = '';
  document.getElementById('init-roi').value      = 5;
  document.getElementById('init-roi-val').textContent = 5;
  document.getElementById('init-hor').value      = 1;
  setHorLbl('init-hor-lbl', 1);
  document.querySelectorAll('[name="init-diff"]').forEach(r => r.checked = r.value==='low');
  document.querySelectorAll('[name="init-effect"]').forEach(r => r.checked = r.value==='mid');
  openModal('initModal');
  setTimeout(() => document.getElementById('init-titel').focus(), 100);
}
function saveInit() {
  const titel = document.getElementById('init-titel').value.trim();
  if (!titel) { document.getElementById('init-titel').focus(); return; }
  const diff   = document.querySelector('[name="init-diff"]:checked')?.value || 'low';
  const effect = document.querySelector('[name="init-effect"]:checked')?.value || 'mid';
  initiatives.push({
    id: nextInitId++,
    wsId: activeWsId,
    titel,
    kort:       document.getElementById('init-kort').value.trim(),
    detaljer:   document.getElementById('init-detaljer').value.trim(),
    effekt:     document.getElementById('init-effekt').value.trim(),
    cost:       parseInt(document.getElementById('init-cost').value)||0,
    deadline:   document.getElementById('init-deadline').value,
    roi:        parseFloat(document.getElementById('init-roi').value)||5,
    horizonIndex: parseInt(document.getElementById('init-hor').value)||1,
    difficulty: diff,
    effect,
    status:     'ongoing',
    createdAt:  new Date().toISOString(),
  });
  closeModal('initModal');
  renderPage();
}
function toggleDone(initId) {
  const i = initiatives.find(x=>x.id===initId);
  if (!i) return;
  i.status = i.status==='done' ? 'ongoing' : 'done';
  renderPage();
}
function openInitDeleteConfirm(initId) {
  deletingInitId = initId;
  const i = initiatives.find(x=>x.id===initId);
  document.getElementById('init-delete-name').textContent = i ? i.titel : '';
  openModal('initDeleteModal');
}
function confirmDeleteInit() {
  if (deletingInitId===null) return;
  initiatives = initiatives.filter(x=>x.id!==deletingInitId);
  deletingInitId = null;
  closeModal('initDeleteModal');
  renderPage();
}
function startEditInit(initId) {
  const c = document.getElementById(`card-${initId}`);
  if (!c) return;
  c.classList.add('edit-mode','expanded');
}
function cancelEditInit(initId) {
  const c = document.getElementById(`card-${initId}`);
  if (c) c.classList.remove('edit-mode');
}
function saveInlineEdit(initId) {
  const i = initiatives.find(x=>x.id===initId);
  if (!i) return;
  const titel = document.getElementById(`ei-titel-${initId}`)?.value.trim();
  if (!titel) return;
  i.titel        = titel;
  i.kort         = document.getElementById(`ei-kort-${initId}`)?.value.trim()||'';
  i.detaljer     = document.getElementById(`ei-det-${initId}`)?.value.trim()||'';
  i.effekt       = document.getElementById(`ei-eff-${initId}`)?.value.trim()||'';
  i.cost         = parseInt(document.getElementById(`ei-cost-${initId}`)?.value)||0;
  i.deadline     = document.getElementById(`ei-dl-${initId}`)?.value||'';
  i.roi          = parseFloat(document.getElementById(`ei-roi-${initId}`)?.value)||5;
  i.horizonIndex = parseInt(document.getElementById(`ei-hor-${initId}`)?.value)||0;
  i.status       = document.getElementById(`ei-status-${initId}`)?.value||'ongoing';
  renderPage();
}

/* For inline edit from list/table view, open a card-view of that init */
function startEditInit(initId) {
  // If we're in card view, just toggle edit mode
  const c = document.getElementById(`card-${initId}`);
  if (c) { c.classList.add('edit-mode','expanded'); return; }
  // Otherwise switch to card view first, then edit
  currentView = 'card';
  renderPage();
  setTimeout(() => {
    const c2 = document.getElementById(`card-${initId}`);
    if (c2) c2.classList.add('edit-mode','expanded');
  }, 50);
}

/* ── BOOT ────────────────────────────────────────────────────────────── */
navigate('dashboard');
</script>
